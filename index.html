<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeFCoN API Teszt</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>DeFCoN API Tesztoldal</h1>
        <p>
          Egy oldalon, sorszamozva fut le minden API-hivas. A progressz sor mutatja,
          eppen melyik endpoint olvasasa tortenik.
        </p>
      </section>

      <section class="controls card">
        <div class="control-group">
          <label for="baseUrl">API v1 base URL</label>
          <input id="baseUrl" type="text" spellcheck="false" />
          <small class="hint">
            Pelda: <code>/api/v1</code> vagy <code>http://localhost:3001/api/v1</code>
          </small>
        </div>

        <div class="control-group">
          <label for="addressInput">Address parameter (address endpointhez)</label>
          <input id="addressInput" type="text" spellcheck="false" placeholder="Automatikus felderites vagy kezi cim" />
        </div>

        <div class="control-group">
          <label for="masternodeInput">Masternode ID parameter</label>
          <input id="masternodeInput" type="text" spellcheck="false" placeholder="Automatikus felderites vagy kezi ID" />
        </div>

        <div class="actions">
          <button id="runButton" type="button">API-k ujraolvasasa</button>
        </div>
      </section>

      <section class="status card">
        <div class="row">
          <strong>Allapot:</strong>
          <span id="runStatus">Varakozas inditasra.</span>
        </div>
        <div class="row">
          <strong>Eppen olvasas alatt:</strong>
          <span id="currentEndpoint">-</span>
        </div>
        <div class="row">
          <strong>Sikeres / hibas / kihagyott:</strong>
          <span id="summary">0 / 0 / 0</span>
        </div>
      </section>

      <section class="results">
        <h2>API eredmenyek</h2>
        <div id="resultsList" class="results-list"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
